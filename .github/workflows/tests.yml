name: CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 16
        uses: actions/setup-java@v4
        with:
          distribution: "adopt"
          java-version: 16
      - name: clean build
        run: ./gradlew clean test --info --stacktrace
